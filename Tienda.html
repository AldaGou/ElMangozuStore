<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mangozu Store</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  :root {
    --bg: #080a08;
    --bg2: #0f130f;
    --bg3: #151a15;
    --card: #0f130f;
    --border: #1e2a1e;
    --text: #f0f5f0;
    --text-muted: #5a7a5a;
    --green: #22c55e;
    --green-dark: #16a34a;
    --accent: #d4a800;
    --gold: #ffd63a;
    --sky: #4ab3e8;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── ANIMATIONS ─── */
  @keyframes rainbow-flow {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  @keyframes shimmer {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── HEADER ─── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(8,10,8,0.93);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    height: 64px;
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    position: relative;
  }

  /* ─── LOGO con avatar ─── */
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    flex-shrink: 0;
  }
  .logo-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    overflow: hidden;
    flex-shrink: 0;
  }
  .logo-avatar img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .logo-text {
    font-size: 1.1rem;
    font-weight: 900;
    letter-spacing: 0.05em;
    white-space: nowrap;
    text-transform: uppercase;
    background: linear-gradient(135deg, #fff 40%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo-text span {
    background: linear-gradient(135deg, var(--accent), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ─── NAV ─── */
  nav {
    display: flex;
    align-items: center;
    gap: 6px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  nav::-webkit-scrollbar { display: none; }

  .filter-btn {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text-muted);
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .filter-btn:hover {
    border-color: #3a5a3a;
    color: var(--text);
    background: #1e2a1e;
  }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 900;
    box-shadow: 0 0 16px rgba(212,168,0,0.4);
  }

  /* ─── HAMBURGER ─── */
  .hamburger {
    display: none;
    flex-direction: column;
    justify-content: center;
    gap: 5px;
    width: 38px; height: 38px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    padding: 8px;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .hamburger:hover { background: #1e2a1e; }
  .hamburger span {
    display: block; height: 2px;
    background: var(--text);
    border-radius: 2px;
    transition: all 0.25s;
    transform-origin: center;
  }
  .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
  .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  .mobile-nav {
    display: none;
    position: absolute;
    top: 64px; left: 0; right: 0;
    background: rgba(8,10,8,0.97);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px 16px;
    flex-wrap: wrap;
    gap: 8px;
    z-index: 99;
  }
  .mobile-nav.open { display: flex; }

  @media (max-width: 640px) {
    nav { display: none; }
    .hamburger { display: flex; }
  }

  /* ─── HERO ─── */
  .hero {
    position: relative;
    text-align: center;
    padding: 60px 24px 48px;
    overflow: hidden;
  }
  .hero-inner { max-width: 1200px; margin: 0 auto; }
  .hero::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse, rgba(212,168,0,0.14) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero h1 {
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 14px;
  }
  .hero h1 em {
    font-style: normal;
    background: linear-gradient(90deg, #d4a800, #ffd63a, #3db85a, #4ab3e8, #d4a800);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s linear infinite;
  }
  .hero p {
    color: var(--text-muted);
    font-size: 1rem;
    max-width: 420px;
    margin: 0 auto;
  }

  /* ─── SECTION LABEL ─── */
  .section-label {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 24px;
    margin: 0 auto 20px;
    max-width: 1200px;
  }
  .section-label span {
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 0.14em;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .section-label::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* ─── GRID ─── */
  .grid-wrapper {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px 16px;
  }
  .products-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }
  @media (max-width: 900px) { .products-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 620px) {
    .products-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .grid-wrapper { padding: 0 14px 14px; }
  }

  /* ─── CARD ─── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
    animation: fade-up 0.4s ease both;
  }
  .card:hover {
    transform: translateY(-5px);
    border-color: #3a5a2a;
    box-shadow: 0 16px 40px rgba(0,0,0,0.5), 0 0 20px rgba(212,168,0,0.06);
  }
  .card-img-wrap {
    position: relative;
    aspect-ratio: 1 / 1;
    overflow: hidden;
  }
  .card-img-wrap img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    transition: transform 0.4s;
  }
  .card:hover .card-img-wrap img { transform: scale(1.06); }

  /* ─── TAGS ─── */
  .tag {
    position: absolute;
    top: 8px; left: 8px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 900;
    font-size: 0.68rem;
    letter-spacing: 0.05em;
    padding: 4px 9px;
    border-radius: 7px;
    text-transform: uppercase;
    pointer-events: none;
    background: rgba(0,0,0,0.55);
    border: none;
    color: #fff;
    text-shadow:
      -2px -2px 0 #000, 2px -2px 0 #000,
      -2px  2px 0 #000, 2px  2px 0 #000,
      -3px  0   0 #000, 3px  0   0 #000,
       0   -3px 0 #000, 0    3px 0 #000;
  }
  .tag.infinito {
    font-size: 0.76rem;
    background: transparent;
    border: none;
    text-shadow: none;
    position: absolute;
  }
  .tag.infinito::before {
    content: '';
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.92);
    border-radius: 7px;
    z-index: 0;
  }
  .tag.infinito .tag-text {
    position: relative; z-index: 1;
    background: linear-gradient(90deg, #ff0000,#ff7700,#ffff00,#00ff00,#00ffff,#0000ff,#8b00ff,#ff0000);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: rainbow-flow 2.5s linear infinite;
  }
  .tag.divino .tag-text {
    color: var(--gold);
    -webkit-text-fill-color: var(--gold);
    text-shadow:
      -2px -2px 0 #000, 2px -2px 0 #000,
      -2px  2px 0 #000, 2px  2px 0 #000,
      -3px  0   0 #000, 3px  0   0 #000,
       0   -3px 0 #000, 0    3px 0 #000;
  }

  /* ─── CARD BODY ─── */
  .card-body {
    padding: 12px 12px 14px;
    display: flex; flex-direction: column;
    gap: 10px; flex: 1;
  }
  .card-name {
    font-size: 0.85rem; font-weight: 700;
    line-height: 1.3; color: var(--text);
  }
  .card-bottom {
    display: flex; align-items: center;
    justify-content: space-between;
    gap: 8px; margin-top: auto;
  }
  .card-price {
    font-size: 1rem; font-weight: 900;
    color: var(--green); letter-spacing: -0.01em;
  }
  .buy-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 7px 12px;
    background: var(--green); color: #000;
    border: none; border-radius: 8px;
    font-family: inherit; font-size: 0.75rem;
    font-weight: 800; cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    white-space: nowrap; letter-spacing: 0.01em;
  }
  .buy-btn:hover { background: #16a34a; transform: scale(1.04); }
  .buy-btn:active { transform: scale(0.97); }
  .buy-btn svg { width: 14px; height: 14px; flex-shrink: 0; }
  .card-bottom a { text-decoration: none; }

  /* ─── EMPTY ─── */
  .empty {
    grid-column: 1 / -1; text-align: center;
    padding: 60px 20px; color: var(--text-muted); font-size: 0.95rem;
  }

  /* ─── PAYMENTS ─── */
  .payments {
    margin-top: 56px;
    border-top: 1px solid var(--border);
    padding: 44px 24px 60px;
    text-align: center;
  }
  .payments-inner { max-width: 1200px; margin: 0 auto; }
  .payments h2 {
    font-size: 0.7rem; font-weight: 800;
    letter-spacing: 0.18em; color: var(--text-muted);
    text-transform: uppercase; margin-bottom: 28px;
  }
  .payment-logos {
    display: flex; align-items: center;
    justify-content: center; flex-wrap: wrap; gap: 16px;
  }
  .pay-pill {
    display: flex; align-items: center; gap: 9px;
    padding: 12px 22px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 14px;
    font-size: 0.9rem; font-weight: 800;
    letter-spacing: 0.02em;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .pay-pill:hover { border-color: #3a5a3a; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
  .pay-pill .icon {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.25rem; flex-shrink: 0;
  }
  .yape { color: #c261f5; }
  .binance { color: #f0b90b; }
  .binance .icon { background: #0b0e11; }
  .paypal { color: #009cde; }
  .paypal .icon { background: linear-gradient(135deg,#003087,#009cde); color:#fff; font-size:1.2rem; }

  /* ─── FOOTER ─── */
  footer {
    text-align: center; padding: 20px;
    color: #2a3a2a; font-size: 0.75rem;
    border-top: 1px solid var(--border);
  }
</style>
</head>

<script>
const products = [
  // INFINITOS
  { name: "Meta Techneta Diamond",       cat: "infinito", price: 38, img: "https://raw.githubusercontent.com/AldaGou/ElMangozuStore/refs/heads/main/DiamondMeta.png" },
  { name: "Meta Techneta Ramdon Muta",   cat: "infinito", price: 38, img: "https://raw.githubusercontent.com/AldaGou/ElMangozuStore/refs/heads/main/Meta.png" },
  { name: "Anububu Diamond",             cat: "infinito", price: 5,  img: "https://raw.githubusercontent.com/AldaGou/ElMangozuStore/refs/heads/main/Anububu%20Diamond.png" },
  { name: "Anububu Ramdon Mutation",     cat: "infinito", price: 4,  img: "https://raw.githubusercontent.com/AldaGou/ElMangozuStore/refs/heads/main/Anububu.jpg" },
  // DIVINOS
  // EXCLUSIVOS
  // ESCUDOS
  { name: "Escudo de 5 Segundos", cat: "escudo", price: 28, img: "https://raw.githubusercontent.com/AldaGou/ElMangozuStore/refs/heads/main/Shield.png" },
  { name: "Escudo de 6 Segundos", cat: "escudo", price: 28, img: "https://raw.githubusercontent.com/AldaGou/ElMangozuStore/refs/heads/main/Shield.png" },
  { name: "Escudo de 7 Segundos", cat: "escudo", price: 24, img: "https://raw.githubusercontent.com/AldaGou/ElMangozuStore/refs/heads/main/Shield.png" },
];

const tagLabel = { infinito: "Infinito", divino: "Divino", exclusivo: "Exclusivo", escudo: "Escudo", baseskin: "Base Skin" };

function tagClass(cat) {
  if (cat === "infinito") return "tag infinito";
  if (cat === "divino") return "tag divino";
  return "tag";
}

function buildCard(p) {
  const waMsg = encodeURIComponent("¡Hola Mangozu Store! Me interesa el ítem: " + p.name);
  const waUrl = "https://wa.me/?text=" + waMsg;
  const card = document.createElement("div");
  card.className = "card";
  card.dataset.cat = p.cat;
  card.innerHTML = `
    <div class="card-img-wrap">
      <img src="${p.img}" alt="${p.name}" loading="lazy">
      <div class="${tagClass(p.cat)}"><span class="tag-text" data-text="${tagLabel[p.cat] || p.cat}">${tagLabel[p.cat] || p.cat}</span></div>
    </div>
    <div class="card-body">
      <div class="card-name">${p.name}</div>
      <div class="card-bottom">
        <div class="card-price">S/. ${p.price}.00</div>
        <a href="${waUrl}" target="_blank" rel="noopener">
          <button class="buy-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
              <path d="M1 1h4l2.68 13.39a2 2 0 001.97 1.61h9.72a2 2 0 001.97-1.61L23 6H6"/>
            </svg>
            Comprar
          </button>
        </a>
      </div>
    </div>`;
  return card;
}

const grid = document.getElementById("grid");

function render(cat) {
  grid.innerHTML = "";
  const filtered = cat === "todos" ? products : products.filter(p => p.cat === cat);
  if (filtered.length === 0) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "No hay productos en esta categoría aún.";
    grid.appendChild(empty);
    return;
  }
  filtered.forEach((p, i) => {
    const card = buildCard(p);
    card.style.animationDelay = i * 0.045 + "s";
    grid.appendChild(card);
  });
}

function setActiveFilter(cat) {
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.toggle("active", b.dataset.cat === cat));
  render(cat);
  document.getElementById("mobileNav").classList.remove("open");
  document.getElementById("hamburger").classList.remove("open");
}

document.querySelectorAll(".filter-btn").forEach(btn => btn.addEventListener("click", () => setActiveFilter(btn.dataset.cat)));

const hamburger = document.getElementById("hamburger");
const mobileNav = document.getElementById("mobileNav");
hamburger.addEventListener("click", () => {
  hamburger.classList.toggle("open");
  mobileNav.classList.toggle("open");
});

render("todos");
</script>
